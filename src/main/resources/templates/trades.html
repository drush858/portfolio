<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/main :: layout(
          ~{::content},
          ${pageTitle},
          ~{::head}
      )}">

<head></head>
<body>
<div th:fragment="content" class="space-y-1">

	<p class="font-bold mb-4"
		    th:text="'Trades – ' + ${account.name}">
	</p>
		
    <div th:if="${successMessage}" class="mb-4 rounded-lg bg-green-100 text-green-800 px-4 py-3">
        <span th:text="${successMessage}"></span>
    </div>

    <div class="rounded-2xl shadow overflow-hidden border border-slate-300 text-slate-400">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-slate-800">
            <tr>
                <th class="px-4 py-3 text-left text-sm font-semibold">Date</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Account</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Symbol</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Type</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Quantity</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Price</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Gross</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Actions</th>
            </tr>
            </thead>

            <tbody class="divide-y divide-gray-100">
            <tr th:each="trade : ${trades}" class="hover:bg-slate-600">
                <td class="px-4 py-3 text-sm"
                    th:text="${#temporals.format(trade.tradeDate, 'yyyy-MM-dd')}">2026-03-31</td>

                <td class="px-4 py-3 text-sm"
                    th:text="${trade.holding.account.name}">Brokerage</td>

                <td class="px-4 py-3 text-sm font-medium"
                    th:text="${trade.symbol}">AAPL</td>

                <td class="px-4 py-3 text-sm">
                    <span th:if="${trade.tradeType.name() == 'BUY'}"
                          class="inline-flex rounded-full bg-red-600 text-white px-2 py-1 text-xs font-semibold"
                          th:text="${trade.tradeType}">BUY</span>

                    <span th:if="${trade.tradeType.name() == 'SELL'}"
                          class="inline-flex rounded-full bg-green-600 text-white px-2 py-1 text-xs font-semibold"
                          th:text="${trade.tradeType}">SELL</span>
                </td>

                <td class="px-4 py-3 text-sm"
                    th:text="${trade.quantity}">10</td>

                <td class="px-4 py-3 text-sm"
                    th:text="'$' + ${#numbers.formatDecimal(trade.price, 1, 2)}">$150.00</td>

                <td class="px-4 py-3 text-sm"
                    th:text="'$' + ${#numbers.formatDecimal(trade.price * trade.quantity, 1, 2)}">$1500.00</td>

                <td class="px-4 py-3 text-sm">
                    <div class="flex flex-wrap gap-2">
                        <a th:href="@{/trades/{id}(id=${trade.id} + '&' + ${account.id})}"
                           class="rounded-lg bg-blue-600 text-white px-3 py-1 hover:bg-blue-700">
                            View
                        </a>

                        <a th:if="${trade.tradeType.name() == 'SELL'}"
                           th:href="@{/trades/sell/{id}/edit(id=${trade.id})}"
                           class="rounded-lg bg-blue-600 text-white px-3 py-1 hover:bg-blue-700">
                            Edit Sell
                        </a>

                        <form th:action="@{/trades/{id}/delete(id=${trade.id})}" method="post" class="inline">
                            <button type="submit"
                                    onclick="return confirm('Delete this trade?');"
                                    class="rounded-lg bg-red-600 text-white px-3 py-1 hover:bg-red-700">
                                Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(trades)}">
                <td colspan="8" class="px-4 py-8 text-center text-gray-500">
                    No trades found.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
