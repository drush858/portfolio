<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/main :: layout(
          ~{::content},
          ${pageTitle},
          ~{::head}
      )}">

<head></head>
<body>
<div th:fragment="content" class="space-y-1">

	<p class="font-bold mb-4"
		    th:text="'Trades – ' + ${account.name}">
	</p>
		
    <div th:if="${successMessage}" class="mb-4 rounded-lg bg-green-100 text-green-800 px-4 py-3">
        <span th:text="${successMessage}"></span>
    </div>

	<form method="get"
	      th:action="@{/trades/view/{id}(id=${account.id})}"
	      class="flex items-center gap-2 mb-4">

	    <input type="text"
	           name="symbol"
	           placeholder="Search symbol (e.g. AAPL)"
	           th:value="${symbol}"
	           class="border rounded px-3 py-1 text-md"/>

	    <input type="hidden" name="size" th:value="${size}"/>

	    <button type="submit"
	            class="px-3 py-1 rounded bg-blue-600 text-white hover:bg-blue-700">
	        Search
	    </button>

	    <a th:href="@{/trades/view/{id}(id=${account.id})}"
	       class="px-3 py-1 rounded bg-gray-200 hover:bg-gray-300">
	        Clear
	    </a>
	</form>
	
    <div class="rounded-2xl shadow overflow-hidden border border-slate-300 text-slate-400">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-slate-800">
            <tr>
                <th class="px-4 py-3 text-left text-sm font-semibold">Date</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Account</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Symbol</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Type</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Quantity</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Price</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Gross</th>
                <th class="px-4 py-3 text-left text-sm font-semibold">Actions</th>
            </tr>
            </thead>

            <tbody class="divide-y divide-gray-100">
            <tr th:each="trade : ${tradePage.content}" class="hover:bg-slate-600">
                <td class="px-4 py-3 text-sm"
                    th:text="${#temporals.format(trade.tradeDate, 'yyyy-MM-dd')}">2026-03-31</td>

                <td class="px-4 py-3 text-sm"
                    th:text="${trade.holding.account.name}">Brokerage</td>

                <td class="px-4 py-3 text-sm font-medium"
                    th:text="${trade.symbol}"></td>

                <td class="px-4 py-3 text-sm">
                    <span th:if="${trade.tradeType.name() == 'BUY'}"
                          class="inline-flex rounded-full bg-red-600 text-white px-2 py-1 text-xs font-semibold"
                          th:text="${trade.tradeType}">BUY</span>

                    <span th:if="${trade.tradeType.name() == 'SELL'}"
                          class="inline-flex rounded-full bg-green-600 text-white px-2 py-1 text-xs font-semibold"
                          th:text="${trade.tradeType}">SELL</span>
                </td>

                <td class="px-4 py-3 text-sm"
                    th:text="${trade.quantity}"></td>

                <td class="px-4 py-3 text-sm"
                    th:text="'$' + ${#numbers.formatDecimal(trade.price, 1, 2)}"></td>

                <td class="px-4 py-3 text-sm"
                    th:text="'$' + ${#numbers.formatDecimal(trade.grossValue, 1, 2)}"></td>

                <td class="px-4 py-3 text-sm">
                    <div class="flex flex-wrap gap-2">
                        <a th:href="@{/trades/{id}(id=${trade.id} + '&' + ${account.id})}"
                           class="rounded-lg bg-blue-600 text-white px-3 py-1 hover:bg-blue-700">
                            View
                        </a>
<!--
						<a th:if="${#strings.contains(trade.symbol, 'C') or #strings.contains(trade.symbol, 'P')}"
						   th:href="@{/trades/{id}/edit(id=${trade.id})}">
						   Edit
						</a>
						
						<a th:if="${trade.tradeType.name() == 'SELL'}"
                           th:href="@{/trades/{id}/edit(id=${trade.id})}"
                           class="rounded-lg bg-blue-600 text-white px-3 py-1 hover:bg-blue-700">
                            Edit Sell
                        </a>
-->
                        <form th:action="@{/trades/{id}/delete(id=${trade.id})}" method="post" class="inline">
                            <button type="submit"
                                    onclick="return confirm('Delete this trade?');"
                                    class="rounded-lg bg-red-600 text-white px-3 py-1 hover:bg-red-700">
                                Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(trades)}">
                <td colspan="8" class="px-4 py-8 text-center text-gray-500">
                    No trades found.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
	<div class="flex items-center justify-between mt-4">

	    <div class="text-sm text-gray-600">
	        Showing <span th:text="${start}"></span> -
	        <span th:text="${end}"></span> of
	        <span th:text="${tradePage.totalElements}"></span>
	    </div>

	    <div class="flex gap-2">

			<a th:if="${tradePage.hasPrevious()}"
			   th:href="@{/trades/view/{id}(id=${account.id}, page=${currentPage - 1}, size=${size}, symbol=${symbol})}"
			   class="px-3 py-1 rounded bg-gray-200 hover:bg-gray-300">
			    Prev
			</a>

			<!-- Page numbers -->
			<span th:each="i : ${#numbers.sequence(0, tradePage.totalPages - 1)}">
			    <a th:href="@{/trades/view/{id}(id=${account.id}, page=${i}, size=${size}, symbol=${symbol})}"
			       th:text="${i + 1}"
			       th:classappend="${i == currentPage} ? 'bg-blue-600 text-white' : 'bg-gray-200 hover:bg-gray-300'"
			       class="px-3 py-1 rounded">
			    </a>
			</span>

			<!-- Next -->
			<a th:if="${tradePage.hasNext()}"
			   th:href="@{/trades/view/{id}(id=${account.id}, page=${currentPage + 1}, size=${size}, symbol=${symbol})}"
			   class="px-3 py-1 rounded bg-gray-200 hover:bg-gray-300">
			    Next
			</a>

	    </div>
	</div>
	<form method="get"
	      th:action="@{/trades/view/{id}(id=${account.id})}"
	      class="mb-4">

	    <label class="text-sm">Rows:</label>

	    <select name="size"
	            onchange="this.form.submit()"
	            class="border rounded px-2 py-1">

	        <option th:value="5"  th:selected="${size == 5}">5</option>
	        <option th:value="10" th:selected="${size == 10}">10</option>
	        <option th:value="25" th:selected="${size == 25}">25</option>
	        <option th:value="50" th:selected="${size == 50}">50</option>
	    </select>

	    <input type="hidden" name="page" value="0"/>
	    <input type="hidden" name="symbol" th:value="${symbol}"/>
	</form>
</div>
</body>
</html>
