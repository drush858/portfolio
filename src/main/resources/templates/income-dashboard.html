<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{layout/main :: layout(
    ~{::content},
    ${pageTitle},
    ~{::head}
)}">

<th:block th:fragment="head"></th:block>

<div th:fragment="content" class="space-y-8">

    <div>
        <h1 class="text-3xl font-bold">Income Dashboard</h1>
        <p class="text-slate-400 mt-1" th:text="'Income for ' + ${year}"></p>
    </div>

    <!-- Summary cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="rounded-xl shadow p-4 border border-slate-600 text-slate-400">
            <div class="text-sm font-bold">Dividends YTD</div>
            <div class="text-2xl font-semibold text-green-700"
                 th:text="${#numbers.formatCurrency(summary.dividendsYtd)}"></div>
        </div>

        <div class="rounded-xl shadow p-4 border border-slate-600 text-slate-400">
            <div class="text-sm font-bold">Interest YTD</div>
            <div class="text-2xl font-semibold text-blue-600"
                 th:text="${#numbers.formatCurrency(summary.interestYtd)}"></div>
        </div>

        <div class="rounded-xl shadow p-4 border border-slate-600 text-slate-400">
            <div class="text-sm font-bold">Total Income YTD</div>
            <div class="text-2xl font-semibold text-emerald-600"
                 th:text="${#numbers.formatCurrency(summary.totalIncomeYtd)}"></div>
        </div>

        <div class="rounded-xl shadow p-4 border border-slate-600 text-slate-400">
            <div class="text-sm font-bold">Trailing 12-Month Income</div>
            <div class="text-2xl font-semibold text-indigo-600"
                 th:text="${#numbers.formatCurrency(summary.trailing12MonthIncome)}"></div>
        </div>
    </div>

    <!-- Monthly income -->
    <div class="rounded-2xl shadow border border-slate-600 overflow-hidden text-slate-400">
        <table class="min-w-full divide-y divide-slate-600">
            <thead class="bg-slate-800 text-sm font-bold">
                <tr>
                    <th class="px-4 py-3 text-left">Month</th>
                    <th class="px-4 py-3 text-right">Dividends</th>
                    <th class="px-4 py-3 text-right">Interest</th>
                    <th class="px-4 py-3 text-right">Total</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-600">
                <tr th:each="row : ${monthlyRows}" class="hover:bg-slate-600">
                    <td class="px-4 py-2"
                        th:text="${#temporals.format(row.month.atDay(1), 'MMMM')}"></td>
                    <td class="px-4 py-2 text-right font-mono"
                        th:text="${#numbers.formatCurrency(row.dividends)}"></td>
                    <td class="px-4 py-2 text-right font-mono"
                        th:text="${#numbers.formatCurrency(row.interest)}"></td>
                    <td class="px-4 py-2 text-right font-mono"
                        th:text="${#numbers.formatCurrency(row.total)}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- By symbol -->
    <div class="rounded-2xl shadow border border-slate-600 overflow-hidden text-slate-400">
        <table class="min-w-full divide-y divide-slate-600">
            <thead class="bg-slate-800 text-sm font-bold">
                <tr>
                    <th class="px-4 py-3 text-left">Symbol</th>
                    <th class="px-4 py-3 text-right">Dividends</th>
                    <th class="px-4 py-3 text-right">Interest</th>
                    <th class="px-4 py-3 text-right">Total</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-600">
                <tr th:each="row : ${symbolRows}" class="hover:bg-slate-600">
                    <td class="px-4 py-2 font-mono" th:text="${row.symbol}"></td>
                    <td class="px-4 py-2 text-right font-mono"
                        th:text="${#numbers.formatCurrency(row.dividends)}"></td>
                    <td class="px-4 py-2 text-right font-mono"
                        th:text="${#numbers.formatCurrency(row.interest)}"></td>
                    <td class="px-4 py-2 text-right font-mono"
                        th:text="${#numbers.formatCurrency(row.total)}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</th:block>
</html>
