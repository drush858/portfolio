<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, pageTitle, headExtra)">

<head>
    
    <title th:text="${pageTitle} ?: 'Portfolio Tracker'">Portfolio Tracker</title>
	
	<meta charset="UTF-8">
	<style>
	/* Normalize inputs across browsers */
	input, textarea, select {
	    appearance: none;
	    border: 1px solid #475569; /* slate-600 */
	    background-color: #1e293b; /* slate-800 */
	    color: #e2e8f0;            /* slate-200 */
	}

	/* Autofill (Chrome + Firefox) – make it blend */
	input:-webkit-autofill {
	    box-shadow: 0 0 0px 1000px #1e293b inset !important;
	    -webkit-text-fill-color: #e2e8f0 !important;
	}

	input:-moz-autofill {
	    box-shadow: 0 0 0px 1000px #1e293b inset !important;
	    -moz-text-fill-color: #e2e8f0 !important;
	}
	</style>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['ui-monospace', 'SFMono-Regular']
                    }
                }
            }
        }
    </script>

    <!-- Page-specific head content -->
    <th:block th:replace="${headExtra}"></th:block>
</head>

<body class="bg-slate-900 text-lime-600">
<div class="max-w-[1300px] mx-auto p-6 space-y-8">

    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Main Content Slot -->
    <main>
        <th:block th:replace="${content}"></th:block>
    </main>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</div>
</body>
</html>
