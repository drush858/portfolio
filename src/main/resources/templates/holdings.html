		<script>
			function toggleLots(button) {
				const holdingId = button.dataset.holdingId;
				const row = document.getElementById(`lots-${holdingId}`);
				const container = row.querySelector('.lots-container');

				if (!row.classList.contains('hidden')) {
					row.classList.add('hidden');
					return;
				}

				row.classList.remove('hidden');

				if (!container.dataset.loaded) {
					fetch(`/trades/lots/${holdingId}`)
						.then(res => res.text())
						.then(html => {
							container.innerHTML = html;
							container.dataset.loaded = "true";
						});
				}
			}
		</script>

		<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

	<div th:fragment="content" class="space-y-2">
		<div>
			<p class="font-bold" th:text="${accountName}">
				Stock Holdings
			</p>
			<!--p class="text-sm text-slate-400 mt-1">Manage your account holdings</p-->
		</div>

		<!-- Portfolio Summary -->
		<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 text-slate-400">

			<!-- Market Value -->
			<div class="rounded-xl shadow p-1 border border-slate-600 ">
				<div class="text-sm font-bold">Market Value</div>
				<div class="text-xl font-semibold text-green-700"
					th:text="${#numbers.formatDecimal(totalMarketValue, 1, 'COMMA', 2, 'POINT')}">
					$0.00
				</div>
			</div>

			<!-- Cost Basis -->
			<div class="rounded-xl shadow p-1 border border-slate-600">
				<div class="text-sm font-bold">Cost Basis</div>
				<div class="text-xl font-semibold text-blue-600"
					th:text="${#numbers.formatDecimal(totalCostBasis, 1, 'COMMA', 2, 'POINT')}">
					$0.00
				</div>
			</div>

			<!-- Gain / Loss -->
			<div class="rounded-xl shadow p-1 border border-slate-600">
				<div class="text-sm font-bold">Unrealized Gain / Loss</div>
				<div th:classappend="${totalGain >= 0} ? 'text-green-700' : 'text-red-700'"
					class="text-xl font-semibold">
					<span th:text="${#numbers.formatDecimal(totalGain, 1, 'COMMA', 2, 'POINT')}"></span>
					<span class="text-sm ml-1 font-semibold"
						th:text="'(' + ${#numbers.formatDecimal(totalGainPercent, 1, 'COMMA', 2, 'POINT')} + '%)'">
					</span>
				</div>
			</div>

		</div>

		<!-- Holdings table -->
		<div class="overflow-hidden rounded-2xl shadow border border-slate-600 text-slate-400">

			<table class="min-w-full divide-y divide-slate-600">
				<thead class="font-bold text-sm bg-slate-800">
					<tr>
						<th class="px-4 py-3">
							<button type="button" onclick="sortHoldings('symbol')"
								class="inline-flex items-center gap-1 hover:underline">
								Symbol
								<span id="symbolSortIcon" class="text-xs">↕</span>
							</button>
						</th>
						<th class="px-4 py-3 text-right">Quantity</th>
						<th class="px-4 py-3 text-right">Avg Cost</th>
						<th class="px-4 py-3 text-right">Market Price</th>
						<th class="px-4 py-3 text-right">Market Value</th>
						<th class="px-4 py-3 text-right">Total Cost</th>
						<th class="px-4 py-3 text-right">
							<button type="button" onclick="sortHoldings('percentGain')"
								class="inline-flex items-center gap-1 hover:underline">
								% Gain

							</button>
						</th>
						<th class="px-4 py-3 text-right">Alloc %</th>
						<th class="px-4 py-3">Allocation</th>
						<th class="px-4 py-3">Action</th>
					</tr>
				</thead>

				<tbody class="divide-y divide-slate-600">
					<th:block th:each="h : ${holdings}">

						<!-- MAIN ROW -->
						<tr class="hover:bg-slate-600" 
							th:attr="
								data-holding-id=${h.holdingId},
								data-symbol=${h.symbol},
								data-percent-gain=${h.percentGain},

								<span th:if="${h.option}">

								</span>
							</td>

							<!-- Average Cost -->
							<td class="px-4 py-2 text-right font-mono"

							<!-- Market Price -->
							<td class="px-4 py-2 text-right font-mono"
								th:text="${#numbers.formatCurrency(h.marketPrice)}"></td>

							<!-- Market Value -->
							<td class="px-4 py-2 text-right font-mono"
								th:text="${#numbers.formatCurrency(h.marketValue)}"></td>

							<!-- Total Cost -->
							<td class="px-4 py-2 text-right font-mono"

							<!-- % Gain -->

							</td>

							</td>

		<script>

			// Tracks sort direction per column key
			const sortState = {
				activeKey: null,
				ascByKey: {}   // key -> boolean
			};

			// Configuration: how to read and compare each column
			const sortConfig = {
				symbol: {
					type: "string",
					get: row => (row.dataset.symbol || "").toUpperCase()
				},
				percentGain: {
					type: "number",
					get: row => parseFloat(row.dataset.percentGain)
				},
				marketValue: {
					type: "number",
					get: row => parseFloat(row.dataset.marketValue)
				},
				totalCost: {
					type: "number",
					get: row => parseFloat(row.dataset.totalCost)
				},
				quantity: {
					type: "number",
					get: row => parseInt(row.dataset.quantity, 10)
				}
			};

			function sortHoldings(key) {
				const cfg = sortConfig[key];
				if (!cfg) return;

				const table = document.querySelector("table.min-w-full");
				const tbody = table ? table.querySelector("tbody") : null;
				if (!tbody) return;

				// Find all main holding rows (not the lots rows)
				const mainRows = Array.from(tbody.querySelectorAll("tr[data-holding-id]"));

				// Build groups: [mainRow, lotsRow?]
				const groups = mainRows.map(mainRow => {
					const holdingId = mainRow.dataset.holdingId;
					const lotsRow = document.getElementById("lots-" + holdingId);

					let val = cfg.get(mainRow);
					// Normalize NaN
					if (cfg.type === "number") {
						val = Number.isFinite(val) ? val : Number.NEGATIVE_INFINITY;
					} else {
						val = (val ?? "").toString();
					}

					return {holdingId, mainRow, lotsRow, val};
				});

				// Toggle direction: first click on a new key = descending for numbers, ascending for strings
				const isNewKey = sortState.activeKey !== key;
				if (isNewKey) {
					sortState.activeKey = key;
					sortState.ascByKey[key] = (cfg.type === "string"); // strings default asc, numbers default desc
				} else {
					sortState.ascByKey[key] = !sortState.ascByKey[key];
				}

				const asc = sortState.ascByKey[key];

				groups.sort((a, b) => {
					if (cfg.type === "number") {
						return asc ? (a.val - b.val) : (b.val - a.val);
					} else {
						// localeCompare keeps it stable/pleasant for strings
						return asc
							? a.val.localeCompare(b.val)
							: b.val.localeCompare(a.val);
					}
				});

				// Re-append in sorted order (moves nodes)
				groups.forEach(g => {
					tbody.appendChild(g.mainRow);
					if (g.lotsRow) tbody.appendChild(g.lotsRow);
				});

				// Update icons: reset all to ↕, then set active to ↑/↓
				document.querySelectorAll("[data-sort-icon]").forEach(el => el.textContent = "↕");
				const activeIcon = document.querySelector(`[data-sort-icon="${key}"]`);
				if (activeIcon) activeIcon.textContent = asc ? "↑" : "↓";
			}

		</script>

				const action = "BUY"; // default to BUY

				document.getElementById('optionUnderlyingInput').value = '';

				document.getElementById('optionTypeInput').value = 'CALL';

				document.getElementById('optionExpirationInput').value = '';

				document.getElementById('optionStrikeInput').value = '';

				document.getElementById('optionTradeTypeInput').value = action;

				document.getElementById('optionQuantityInput').value = '';
				document.getElementById('optionPriceInput').value = '';

				// Title
				document.getElementById("optionModalTitle").innerText = 'Add Option Trade';

				document.getElementById('optionTradeModal').classList.remove('hidden');
				document.getElementById('optionTradeModal').classList.add('flex');
			}

			function closeOptionTradeModal() {
				const modal = document.getElementById('optionTradeModal');
				modal.classList.add('hidden');
				modal.classList.remove('flex');
			}

			function openOptionTradeModalForRow(button) {

				const row = button.closest("tr");
				if (!row) return;

				const action = button.dataset.tradeType || "BUY";

				const symbol = button.dataset.symbol || "";

				document.getElementById('optionUnderlyingInput').value =
					button.dataset.underlying || '';

				document.getElementById('optionTypeInput').value =
					button.dataset.optionType || 'CALL';

				document.getElementById('optionExpirationInput').value =
					button.dataset.expiration || '';

				document.getElementById('optionStrikeInput').value =
					button.dataset.strikePrice || '';

				document.getElementById('optionTradeTypeInput').value = action;

				document.getElementById('optionQuantityInput').value = '';
				document.getElementById('optionPriceInput').value = '';

				// Title
				const title = (action === "SELL") ? "Sell" : "Buy";
				document.getElementById("optionModalTitle").innerText = title + " " + (symbol || "");

				const modal = document.getElementById('optionTradeModal');
				modal.classList.remove('hidden');
				modal.classList.add('flex');
			}

			function openTradeModal(button) {
				const row = button.closest("tr");
				if (!row) return;

				const symbol = row.getAttribute("data-symbol");
				const action = button.getAttribute("data-action"); // BUY or SELL
				const qty = row.getAttribute("data-quantity");
				const quantity = (action === "SELL") ? qty : "";
				const marketPrice = row.getAttribute("data-market-price");

				const formattedDate = new Date().toISOString().slice(0, 10);

				// Fill modal fields
				document.getElementById("symbolInputModal").value = symbol || "";
				document.getElementById("tradeDateInputModal").value = formattedDate;
				document.getElementById("quantityInputModal").value = quantity;
				document.getElementById("priceInputModal").value = marketPrice;

				// Title + formaction
				const title = (action === "SELL") ? "Sell" : "Buy";
				document.getElementById("tradeModalTitle").innerText = title + " " + (symbol || "");

				// Set the form action to your existing endpoints
				const accountId = document.getElementById("accountIdInput")?.value;
				const form = document.getElementById("tradeForm");

				if (accountId) {
					form.action = (action === "SELL")
						? `/trades/stock/sell`
						: `/trades/stock/add`;
				}

				// Open modal
				const modal = document.getElementById("tradeModal");
				modal.classList.remove("hidden");
				modal.classList.add("flex");
			}

			function openNewTradeModal() {

				const formattedDate = new Date().toISOString().slice(0, 10);

				// Fill modal fields
				document.getElementById("symbolInputModal").value = "";
				document.getElementById("tradeDateInputModal").value = formattedDate;
				document.getElementById("quantityInputModal").value = "";
				document.getElementById("priceInputModal").value = "";

				// Title + formaction
				document.getElementById("tradeModalTitle").innerText = "Buy Stock";

				// Set the form action
				const accountId = document.getElementById("accountIdInput")?.value;
				const form = document.getElementById("tradeForm");

				if (accountId) {
					form.action = `/trades/stock/add`;
				}

				// Open modal
				const modal = document.getElementById("tradeModal");
				modal.classList.remove("hidden");
				modal.classList.add("flex");
			}

			function closeTradeModal() {
				const modal = document.getElementById("tradeModal");
				modal.classList.add("hidden");
				modal.classList.remove("flex");
			}
