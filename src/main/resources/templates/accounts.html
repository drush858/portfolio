<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/main :: layout(
          ~{::content},
          ${pageTitle},
          ~{::head}
      )}">

<head></head>
<body>
<div th:fragment="content" class="space-y-3">

    <!-- Header -->
    <div>
        <p class="font-bold">Brokerage Accounts</p>
    </div>

    <!-- Accounts Table -->
    <div class="overflow-hidden rounded-xl shadow border border-slate-600 bg-slate-900 text-slate-400">
        <table class="min-w-full divide-y divide-slate-600">
            <thead class="bg-slate-800">
                <tr>
                    <th class="px-1 py-1 text-left text-sm font-bold">
                        Name
                    </th>
                    <th class="px-1 py-1 text-left text-sm font-bold">
                        Number
                    </th>
                    <th class="px-1 py-1 text-right text-sm font-bold">
                        Actions
                    </th>
                </tr>
            </thead>

            <tbody class="divide-y divide-slate-600">
                <tr th:each="a : ${accounts}" class="hover:bg-slate-600 ">
                    <td class="px-1 py-1 font-medium"
                        th:text="${a.name}">
                    </td>

                    <td class="px-1 py-1"
                        th:text="${a.number}">
                    </td>

                    <td class="px-1 py-1">
                        <div class="flex justify-end gap-2">

                            <form th:action="@{/holdings/view/{id}(id=${a.id})}"
                                  method="get">
                                <button
                                    class="px-1 py-1 text-sm rounded-lg bg-blue-600 border border-slate-300 text-white hover:bg-blue-700">
                                    Holdings
                                </button>
                            </form>

							<form th:action="@{/accounts/cash/{id}(id=${a.id})}"
                                  method="get">
                                <button
                                    class="px-1 py-1 text-sm rounded-lg bg-blue-600 border border-slate-300 text-white hover:bg-blue-700">
                                    Cash
                                </button>
                            </form>

                            <form th:if="${a.active}"
                                  th:action="@{/accounts/deactivate/{id}(id=${a.id})}"
                                  method="post">
                                <button
                                    class="px-1 py-1 text-sm rounded-lg bg-red-600 text-white border border-slate-300 hover:bg-red-700">
                                    Deactivate
                                </button>
                            </form>

                            <form th:unless="${a.active}"
                                  th:action="@{/accounts/activate/{id}(id=${a.id})}"
                                  method="post">
                                <button
                                    class="px-1 py-1.5 text-sm rounded-lg bg-green-600 border border-slate-300 text-white hover:bg-green-700">
                                    Activate
                                </button>
                            </form>

                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

	<form id="incomeForm" method="get"
	      onsubmit="event.preventDefault(); goToIncomeYear();"
	      class="flex items-center gap-3">

	    <input type="number"
	           id="incomeYearInput"
	           min="1900"
	           max="2100"
	           required
	           th:value="${#temporals.createNow().year}"
	           class="w-28 rounded-md border border-slate-300 px-1 py-1
	                  focus:border-blue-500 focus:ring-blue-500 bg-slate-400 text-slate-800" />

	    <button type="submit"
	            class="px-1 py-1 text-sm rounded-lg bg-emerald-600 text-white hover:bg-emerald-800 border border-slate-300">
	        View Income Dashboard
	    </button>
	</form>
	
	<script>
	function goToIncomeYear() {
	    const year = document.getElementById('incomeYearInput').value;
	    if (!year) return;
	    window.location.href = '/accounts/income/' + year;
	}
	</script>
	
	<!-- Totals -->
    <div class="bg-slate-900">
        <h2 class="font-bold mb-4">Sold Totals</h2>

		<div class="flex flex-wrap gap-3">
		    <form id="soldActionsForm" method="get" class="flex items-center gap-3">

		        <input id="soldYear"
		               type="number"
		               min="1900"
		               max="2100"
		               required
		               placeholder="Year"
		               th:value="${#temporals.format(#temporals.createNow(), 'yyyy')}"
		               class="w-28 rounded-md border px-1 py-1
		                      border-slate-300 focus:ring-blue-500 focus:border-blue-500
		                      bg-slate-400 text-slate-800" />

		        <button type="button"
		                onclick="submitSoldAction('view')"
		                class="px-1 py-1 text-sm rounded-lg bg-emerald-600 text-white
		                       hover:bg-emerald-800 border border-slate-300">
		            View Sold Totals
		        </button>

		        <button type="button"
		                onclick="submitSoldAction('csv')"
		                class="px-1 py-1 text-sm rounded-lg bg-emerald-600 text-white
		                       hover:bg-emerald-800 border border-slate-300">
		            Download CSV
		        </button>

		        <button type="button"
		                onclick="submitSoldAction('excel')"
		                class="px-1 py-1 text-sm rounded-lg bg-emerald-600 text-white
		                       hover:bg-emerald-800 border border-slate-300">
		            Download Excel
		        </button>
		    </form>
		</div>
		
    </div>
	
	<script>
	function submitSoldAction(action) {
	    const yearInput = document.getElementById("soldYear");
	    const form = document.getElementById("soldActionsForm");
	    const year = yearInput.value;

	    if (!year) {
	        yearInput.reportValidity();
	        return;
	    }

	    if (action === "view") {
	        form.action = "/trades/sold";
	        yearInput.name = "year";
	    } else if (action === "csv") {
	        form.action = "/trades/sold/" + year + "/export/csv";
	        yearInput.name = "";
	    } else if (action === "excel") {
	        form.action = "/trades/sold/" + year + "/export/excel";
	        yearInput.name = "";
	    }

	    form.submit();

	    // restore for next use
	    yearInput.name = "year";
	}
	</script>
		
    <!-- Create Account -->
    <div class="max-w-lg bg-slate-900">
        <p class="font-bold mb-4">Create Account</p>

        <form th:action="@{/accounts}"
              th:object="${account}"
              method="post"
              class="shadow rounded-xl p-1 space-y-1 border border-slate-600 text-slate-400">

            <div>
                <label class="block text-sm">
                    Name
                </label>
                <input th:field="*{name}"
                       class="mt-1 w-full rounded-lg border-slate-300 focus:ring-blue-500 focus:border-blue-500 bg-slate-400 text-slate-800"/>
            </div>

            <div>
                <label class="block text-sm">
                    Number
                </label>
                <input th:field="*{number}"
                       class="mt-1 w-full rounded-lg border-slate-300 focus:ring-blue-500 focus:border-blue-500 bg-slate-400 text-slate-800"/>
            </div>

            <div class="text-right">
                <button
                    class="px-1 py-1 text-sm rounded-lg bg-blue-600 text-white hover:bg-blue-700 border border-slate-300">
                    Add Account
                </button>
            </div>
        </form>
    </div>

    <!-- Import Trades -->
    <div class="max-w-lg bg-slate-900">
        <p class="font-bold mb-4">Import Trades</p>

        <form th:action="@{/trades/import}"
              method="post"
              enctype="multipart/form-data"
              class="shadow rounded-xl p-1 border border-slate-600 space-y-1">

            <input type="file"
                   name="file"
                   accept=".csv"
                   required
                   class="block w-full text-sm text-slate-400"/>

            <button
                class="px-1 py-1 text-sm rounded-lg bg-blue-600 text-white hover:bg-blue-700 border border-slate-300">
                Import CSV
            </button>
        </form>
    </div>
	<p class="font-bold mb-4">Maintenance Only</p>
	<form th:action="@{/accounts/admin/rebuild-holdings}" method="post">
			<button class="px-1 py-1 text-sm rounded-lg bg-emerald-600 text-white hover:bg-emerald-800 border border-slate-300">
		    	Rebuild Holdings
		    </button>
	</form>
    

</div>
</body>
</html>
