<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/main :: layout(
          ~{::content},
          ${pageTitle},
          ~{::head}
      )}">

<head></head>
<body>
<div th:fragment="content" class="space-y-3">

    <!-- Header -->
    <div>
        <p class="font-bold">Brokerage Accounts</p>
    </div>

    <!-- Accounts Table -->
    <div class="overflow-hidden rounded-xl shadow border border-slate-600 bg-slate-900 text-slate-400">
        <table class="min-w-full divide-y divide-slate-600">
            <thead class="bg-slate-800">
                <tr>
                    <th class="px-1 py-1 text-left text-sm font-bold">
                        Name
                    </th>
                    <th class="px-1 py-1 text-left text-sm font-bold">
                        Number
                    </th>
                    <th class="px-1 py-1 text-right text-sm font-bold">
                        Actions
                    </th>
                </tr>
            </thead>

            <tbody class="divide-y divide-slate-600">
                <tr th:each="a : ${accounts}" class="hover:bg-slate-600 ">
                    <td class="px-1 py-1 font-medium"
                        th:text="${a.name}">
                    </td>

                    <td class="px-1 py-1"
                        th:text="${a.number}">
                    </td>

                    <td class="px-1 py-1">
                        <div class="flex justify-end gap-2">

                            <form th:action="@{/holdings/view/{id}(id=${a.id})}"
                                  method="get">
                                <button
                                    class="px-1 py-1 text-sm rounded-lg bg-blue-600 border border-slate-300 text-white hover:bg-blue-700">
                                    Holdings
                                </button>
                            </form>

							<form th:action="@{/accounts/cash/{id}(id=${a.id})}"
                                  method="get">
                                <button
                                    class="px-1 py-1 text-sm rounded-lg bg-blue-600 border border-slate-300 text-white hover:bg-blue-700">
                                    Cash
                                </button>
                            </form>

							<form th:action="@{/trades/view/{id}(id=${a.id})}"
                                  method="get">
                                <button
                                    class="px-1 py-1 text-sm rounded-lg bg-blue-600 border border-slate-300 text-white hover:bg-blue-700">
                                    Trades
                                </button>
                            </form>
														
                            <form th:if="${a.active}"
                                  th:action="@{/accounts/deactivate/{id}(id=${a.id})}"
                                  method="post">
                                <button
                                    class="px-1 py-1 text-sm rounded-lg bg-red-600 text-white border border-slate-300 hover:bg-red-700">
                                    Deactivate
                                </button>
                            </form>

                            <form th:unless="${a.active}"
                                  th:action="@{/accounts/activate/{id}(id=${a.id})}"
                                  method="post">
                                <button
                                    class="px-1 py-1.5 text-sm rounded-lg bg-green-600 border border-slate-300 text-white hover:bg-green-700">
                                    Activate
                                </button>
                            </form>

                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

	<!-- Totals -->
    <div class="bg-slate-900">
        <p class="font-bold mb-4">Income/Sold Totals</p>

		<div class="flex flex-wrap gap-3">
		    <form id="soldActionsForm" method="get" class="flex items-center gap-3">

		        <input 
				       type="number"
					   name="year"
		               min="1900"
		               max="2100"
		               required
		               placeholder="Tax Year"
		               th:value="${#temporals.format(#temporals.createNow(), 'yyyy')}"
		               class="w-28 rounded-md border px-1 py-1
		                      border-slate-300 focus:ring-blue-500 focus:border-blue-500
		                      bg-slate-400 text-slate-800" />

			  	<button type="submit"
			  	        formaction="/accounts/income"
			  	        class="px-1 py-1 text-sm rounded-lg bg-emerald-600 text-white
			  	               hover:bg-emerald-800 border border-slate-300">
			  	    Income Dashboard
			  	</button>
				<button type="submit"
		                formaction="/trades/sold"
						class="px-1 py-1 text-sm rounded-lg bg-emerald-600 text-white
		                       hover:bg-emerald-800 border border-slate-300">
		            View Sold Totals
		        </button>

		        <button type="submit"
		                formaction="/trades/sold/export/csv"
		                class="px-1 py-1 text-sm rounded-lg bg-emerald-600 text-white
		                       hover:bg-emerald-800 border border-slate-300">
		            Download CSV
		        </button>

		        <button type="submit"
		                formaction="/trades/sold/export/excel"
		                class="px-1 py-1 text-sm rounded-lg bg-emerald-600 text-white
		                       hover:bg-emerald-800 border border-slate-300">
		            Download Excel
		        </button>
				
		    </form>
		</div>
		
    </div>
		
    <!-- Create Account -->
    <div class="max-w-lg bg-slate-900">
        <p class="font-bold mb-4">Create Account</p>

        <form th:action="@{/accounts}"
              th:object="${account}"
              method="post"
              class="shadow rounded-xl p-1 space-y-1 border border-slate-600 text-slate-400">

            <div>
                <label class="block text-sm">
                    Name
                </label>
                <input th:field="*{name}"
                       class="mt-1 w-full rounded-lg border-slate-300 focus:ring-blue-500 focus:border-blue-500 bg-slate-400 text-slate-800"/>
            </div>

            <div>
                <label class="block text-sm">
                    Number
                </label>
                <input th:field="*{number}"
                       class="mt-1 w-full rounded-lg border-slate-300 focus:ring-blue-500 focus:border-blue-500 bg-slate-400 text-slate-800"/>
            </div>

            <div class="text-right">
                <button
                    class="px-1 py-1 text-sm rounded-lg bg-blue-600 text-white hover:bg-blue-700 border border-slate-300">
                    Add Account
                </button>
            </div>
        </form>
    </div>

    <!-- Import Trades -->
    <div class="max-w-lg bg-slate-900">
        <p class="font-bold mb-4">Import Trades</p>

        <form th:action="@{/trades/import}"
              method="post"
              enctype="multipart/form-data"
              class="shadow rounded-xl p-1 border border-slate-600 space-y-1">

            <input type="file"
                   name="file"
                   accept=".csv"
                   required
                   class="block w-full text-sm text-slate-400"/>

            <button
                class="px-1 py-1 text-sm rounded-lg bg-blue-600 text-white hover:bg-blue-700 border border-slate-300">
                Import CSV
            </button>
        </form>
    </div>
	<p class="font-bold mb-4">Maintenance Only</p>
	<form th:action="@{/accounts/admin/rebuild-holdings}" method="post">
			<button class="px-1 py-1 text-sm rounded-lg bg-emerald-600 text-white hover:bg-emerald-800 border border-slate-300">
		    	Rebuild Holdings
		    </button>
	</form>
    

</div>
</body>
</html>
