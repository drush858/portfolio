<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/main :: layout(
          ~{::content},
          ${pageTitle},
          ~{::head}
      )}">

<head>
	
	<script type="text/javascript">

		function getTodaysYear() {
						
			const currentYear = new Date().getFullYear();  
			document.getElementById("soldYear").value = currentYear;
			//date = formattedDate;
			//year = currentYear;
		}
			
		//var year;

		// Assign function to window.onload
		window.onload = getTodaysYear;
			
	</script>
</head>
<body>
<div th:fragment="content" class="space-y-10">

    <!-- Header -->
    <div>
        <h1 class="text-2xl font-bold">Brokerage Accounts</h1>
        <p class="text-slate-400 mt-1">Manage your brokerage accounts and holdings</p>
    </div>

    <!-- Accounts Table -->
    <div class="overflow-hidden rounded-2xl shadow border border-slate-600 bg-slate-900 text-slate-400">
        <table class="min-w-full divide-y divide-slate-600">
            <thead class="bg-slate-800">
                <tr>
                    <th class="px-6 py-3 text-left text-sm font-bold">
                        Name
                    </th>
                    <th class="px-6 py-3 text-left text-sm font-bold">
                        Number
                    </th>
                    <th class="px-6 py-3 text-right text-sm font-bold">
                        Actions
                    </th>
                </tr>
            </thead>

            <tbody class="divide-y divide-slate-600">
                <tr th:each="a : ${accounts}" class="hover:bg-slate-600 ">
                    <td class="px-6 py-4 font-medium"
                        th:text="${a.name}">
                    </td>

                    <td class="px-6 py-4"
                        th:text="${a.number}">
                    </td>

                    <td class="px-6 py-4">
                        <div class="flex justify-end gap-2">

                            <form th:action="@{/holdings/view/{id}(id=${a.id})}"
                                  method="get">
                                <button
                                    class="px-3 py-1.5 text-sm rounded-lg bg-blue-600 border border-slate-300 text-white hover:bg-blue-700">
                                    Holdings
                                </button>
                            </form>

							<form th:action="@{/accounts/cash/{id}(id=${a.id})}"
                                  method="get">
                                <button
                                    class="px-3 py-1.5 text-sm rounded-lg bg-blue-600 border border-slate-300 text-white hover:bg-blue-700">
                                    Cash
                                </button>
                            </form>

                            <form th:if="${a.active}"
                                  th:action="@{/accounts/deactivate/{id}(id=${a.id})}"
                                  method="post">
                                <button
                                    class="px-3 py-1.5 text-sm rounded-lg bg-red-600 text-white border border-slate-300 hover:bg-red-700">
                                    Deactivate
                                </button>
                            </form>

                            <form th:unless="${a.active}"
                                  th:action="@{/accounts/activate/{id}(id=${a.id})}"
                                  method="post">
                                <button
                                    class="px-3 py-1.5 text-sm rounded-lg bg-green-600 border border-slate-300 text-white hover:bg-green-700">
                                    Activate
                                </button>
                            </form>

                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

	<form id="incomeForm" method="get"
	      onsubmit="event.preventDefault(); goToIncomeYear();"
	      class="flex items-center gap-3">

	    <input type="number"
	           id="incomeYearInput"
	           min="1900"
	           max="2100"
	           required
	           th:value="${#temporals.createNow().year}"
	           class="w-28 rounded-md border border-slate-300 px-3 py-2
	                  focus:border-blue-500 focus:ring-blue-500 bg-slate-400 text-slate-800" />

	    <button type="submit"
	            class="px-4 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-800 border border-slate-300">
	        View Income Dashboard
	    </button>
	</form>
	<form th:action="@{/accounts/admin/rebuild-holdings}" method="post">
		<button class="px-4 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-800 border border-slate-300">
	    	Rebuild Holdings
	    </button>
	</form>
	<script>
	function goToIncomeYear() {
	    const year = document.getElementById('incomeYearInput').value;
	    if (!year) return;
	    window.location.href = '/accounts/income/' + year;
	}
	</script>
	
	<!-- Totals -->
    <div class="bg-slate-900">
        <h2 class="text-xl font-bold mb-4">Sold Totals</h2>

        <div class="flex flex-wrap gap-3">
            <form id="soldForm" th:action="@{/trades/sold}" method="get" class="flex items-center gap-3">
				
				<input id="soldYear" 
				       type="number"
				       name="year"
				       min="1900"
				       max="2100"
				       required
				       placeholder="Year"
				       class="w-28 rounded-md border px-3 py-2
				              border-slate-300 focus:ring-blue-500 focus:border-blue-500 bg-slate-400 text-slate-800" />
								  
                <button type="submit" 
				        class="px-4 py-2 rounded-lg bg-emerald-600 text-white 
						       hover:bg-emerald-800 border border-slate-300">
                    View Sold Totals
                </button>
            </form>

            <form th:action="@{/trades/sold/2026/export/csv}" method="get">
                <button class="px-4 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-800 border border-slate-300">
                    Download CSV
                </button>
            </form>

            <form th:action="@{/trades/sold/2026/export/excel}" method="get">
                <button class="px-4 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-800 border border-slate-300">
                    Download Excel
                </button>
            </form>
        </div>
    </div>
		
    <!-- Create Account -->
    <div class="max-w-lg bg-slate-900">
        <h2 class="text-xl font-bold mb-4">Create Account</h2>

        <form th:action="@{/accounts}"
              th:object="${account}"
              method="post"
              class="shadow rounded-2xl p-6 space-y-4 border border-slate-600 text-slate-400">

            <div>
                <label class="block text-sm">
                    Name
                </label>
                <input th:field="*{name}"
                       class="mt-1 w-full rounded-lg border-slate-300 focus:ring-blue-500 focus:border-blue-500 bg-slate-400 text-slate-800"/>
            </div>

            <div>
                <label class="block text-sm">
                    Number
                </label>
                <input th:field="*{number}"
                       class="mt-1 w-full rounded-lg border-slate-300 focus:ring-blue-500 focus:border-blue-500 bg-slate-400 text-slate-800"/>
            </div>

            <div class="text-right">
                <button
                    class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 border border-slate-300">
                    Add Account
                </button>
            </div>
        </form>
    </div>

    <!-- Import Trades -->
    <div class="max-w-lg bg-slate-900">
        <h2 class="text-xl font-bold mb-4">Import Trades</h2>

        <form th:action="@{/trades/import}"
              method="post"
              enctype="multipart/form-data"
              class="shadow rounded-2xl p-6 border border-slate-600 space-y-4">

            <input type="file"
                   name="file"
                   accept=".csv"
                   required
                   class="block w-full text-sm text-slate-400"/>

            <button
                class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 border border-slate-300">
                Import CSV
            </button>
        </form>
    </div>

    

</div>
</body>
</html>
