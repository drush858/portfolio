<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, ${pageTitle}, ~{::head})}">

<head></head>

<body>
<div th:fragment="content" class="space-y-4">

    <h2 class="text-lg font-bold">Edit Option Trade</h2>

    <form th:action="@{/trades/options/{id}/edit(id=${trade.id})}"
          th:object="${tradeEditForm}"
          method="post"
          class="space-y-3">

        <!-- DateTime -->
        <div>
            <label>Date / Time</label>
            <input type="datetime-local"
                   th:field="*{tradeDate}"
                   class="w-full bg-slate-900 text-slate-300 rounded-md border border-slate-600"/>
        </div>

        <!-- Price -->
        <div>
            <label>Price</label>
            <input type="number"
                   step="0.01"
                   th:field="*{price}"
                   class="w-full bg-slate-900 text-slate-300 rounded-md border border-slate-600"/>
        </div>

        <!-- Quantity -->
        <div>
            <label>Quantity</label>
            <input type="number"
                   min="1"
                   th:field="*{quantity}"
                   class="w-full bg-slate-900 text-slate-300 rounded-md border border-slate-600"/>
        </div>

        <button type="submit"
                class="px-3 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
            Update Option Trade
        </button>

    </form>

</div>
</body>
</html>
